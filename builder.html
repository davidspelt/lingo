<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Data Beheerder</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --danger-color: #dc2626;
            --success-color: #16a34a;
            --secondary-color: #64748b;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background: var(--card-bg);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 1.5rem;
        }

        .tab-content.active {
            display: block;
        }

        /* Tree Controls */
        .tree-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: #475569;
        }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px dashed var(--primary-color);
        }

        .btn-outline:hover {
            background-color: #eff6ff;
        }

        .btn-danger {
            background-color: var(--danger-color);
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-weight: bold;
            padding: 0 4px;
        }

        .btn-icon:hover {
            color: var(--danger-color);
        }

        /* Tree View Styles */
        .tree-view details {
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            background-color: #fafafa;
        }

        .tree-view summary {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
            outline: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tree-view ul {
            list-style-type: none;
            padding-left: 0;
            margin: 0.75rem 0 0 0;
        }

        .question-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
        }

        /* Inline Editable Field Styling */
        [contenteditable="true"] {
            border: 1px dashed transparent;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        [contenteditable="true"]:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        [contenteditable="true"]:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .question-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: inline-block;
            width: calc(100% - 80px);
        }

        .answers-list {
            padding-left: 0.5rem !important;
            margin: 0.25rem 0 !important;
            font-size: 0.9rem;
            color: #475569;
        }

        .answer-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .answer-index {
            font-weight: bold;
            color: #64748b;
            min-width: 20px;
        }

        .correct-badge {
            color: var(--success-color);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        /* JSON View Styles */
        .json-container {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        pre {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 450px;
            font-size: 0.9rem;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Tabs Header -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tree-tab', this)">Categorie & Vragen Tree</button>
        <button class="tab-btn" onclick="switchTab('json-tab', this)">Ruwe JSON Data</button>
    </div>

    <!-- Tree View Tab -->
    <div id="tree-tab" class="tab-content active">
        <div class="tree-header">
            <h3 style="margin: 0;">Interactieve Editor</h3>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="resetToDefault()">Reset Naar Standaard</button>
                <button class="btn" onclick="addCategory()">+ Categorie Toevoegen</button>
            </div>
        </div>
        <div id="tree-container" class="tree-view"></div>
    </div>

    <!-- JSON View Tab -->
    <div id="json-tab" class="tab-content">
        <div class="json-container">
            <button class="btn copy-btn" onclick="copyJsonData()">Kopieer JSON</button>
            <pre><code id="json-code"></code></pre>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = "quiz_data_cache_v3";

    // Exact requested JSON format example data
    const defaultDataset = {
        "merken": [
            {"question": "Welk sportmerk heeft een logo dat bekend staat als de 'Swoosh'?", "answers": ["Adidas", "Puma", "Nike", "Reebok"], "correct": 2},
            {"question": "Uit welk land komt het bekende meubelmerk IKEA?", "answers": ["Denemarken", "Zweden", "Noorwegen", "Finland"], "correct": 1},
            {"question": "Welke tech-gigant produceerde oorspronkelijk speelkaarten?", "answers": ["Nintendo", "Sony", "Apple", "Sega"], "correct": 0}
        ],
        "geografie": [
            {"question": "Wat is de hoofdstad van Australië?", "answers": ["Sydney", "Melbourne", "Canberra", "Brisbane"], "correct": 2},
            {"question": "Welke rivier stroomt er dwars door de stad Parijs?", "answers": ["De Loire", "De Seine", "De Rhône", "De Rijn"], "correct": 1},
            {"question": "Wat is het grootste land ter wereld qua oppervlakte?", "answers": ["Canada", "Verenigde Staten", "China", "Rusland"], "correct": 3}
        ],
        "spellen": [
            {"question": "In welk populair spel vechten 100 spelers op een eiland tot er één overleeft?", "answers": ["Minecraft", "Fortnite", "Apex Legends", "PUBG"], "correct": 1},
            {"question": "Hoeveel vakjes heeft een standaard schaakbord?", "answers": ["36", "48", "64", "81"], "correct": 2},
            {"question": "Welk personage is de iconische mascotte van SEGA?", "answers": ["Mario", "Crash Bandicoot", "Sonic the Hedgehog", "Pac-Man"], "correct": 2}
        ],
        "films": [
            {"question": "Wie speelde de hoofdrol van Jack Dawson in de klassieker Titanic?", "answers": ["Brad Pitt", "Leonardo DiCaprio", "Matt Damon", "Johnny Depp"], "correct": 1},
            {"question": "Welke filmreeks bevat personages genaamd 'Hobbits'?", "answers": ["Star Wars", "Harry Potter", "The Lord of the Rings", "The Chronicles of Narnia"], "correct": 2},
            {"question": "Hoeveel Oscars won de film 'Avatar' (2009) in totaal?", "answers": ["3", "5", "7", "11"], "correct": 0}
        ]
    };

    // Load dataset from LocalStorage Cache or fallback to default
    let dataset = loadDataset();

    function loadDataset() {
        const cachedData = localStorage.getItem(STORAGE_KEY);
        if (cachedData) {
            try {
                return JSON.parse(cachedData);
            } catch (e) {
                console.error("Fout bij het laden van cache:", e);
            }
        }
        return defaultDataset;
    }

    // Save dataset to LocalStorage Cache
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataset));
        renderJson();
    }

    // Reset Cache to Original Default
    function resetToDefault() {
        if (confirm("Weet je zeker dat je alle wijzigingen wilt wissen en wilt herstellen naar het standaard voorbeeld?")) {
            dataset = JSON.parse(JSON.stringify(defaultDataset));
            saveData();
            renderTree();
        }
    }

    // Render Tree with Inline Editors
    function renderTree() {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';

        Object.keys(dataset).forEach((categoryKey) => {
            const questions = dataset[categoryKey];

            const details = document.createElement('details');
            details.open = true;
            
            const summary = document.createElement('summary');
            
            // Editable Category Name (Key in object)
            const catNameSpan = document.createElement('span');
            catNameSpan.contentEditable = true;
            catNameSpan.textContent = categoryKey;
            catNameSpan.onblur = (e) => {
                const newKey = e.target.textContent.trim();
                if (newKey && newKey !== categoryKey) {
                    dataset[newKey] = dataset[categoryKey];
                    delete dataset[categoryKey];
                    saveData();
                    renderTree();
                }
            };

            const countSpan = document.createElement('span');
            countSpan.style.color = '#64748b';
            countSpan.style.fontSize = '0.9rem';
            countSpan.textContent = `(${questions.length})`;

            // Delete Category Button
            const delCatBtn = document.createElement('button');
            delCatBtn.className = 'btn btn-danger';
            delCatBtn.textContent = 'Verwijder';
            delCatBtn.onclick = (e) => {
                e.stopPropagation();
                delete dataset[categoryKey];
                saveData();
                renderTree();
            };

            summary.appendChild(catNameSpan);
            summary.appendChild(countSpan);
            summary.appendChild(delCatBtn);
            
            const list = document.createElement('ul');

            questions.forEach((qItem, qIndex) => {
                const li = document.createElement('li');
                li.className = 'question-card';

                // Editable Question Title
                const qTitle = document.createElement('div');
                qTitle.className = 'question-title';
                qTitle.contentEditable = true;
                qTitle.textContent = qItem.question;
                qTitle.onblur = (e) => {
                    dataset[categoryKey][qIndex].question = e.target.textContent.trim();
                    saveData();
                };

                // Delete Question Button
                const delQBtn = document.createElement('button');
                delQBtn.className = 'btn btn-danger';
                delQBtn.style.float = 'right';
                delQBtn.textContent = 'Wis Vraag';
                delQBtn.onclick = () => {
                    dataset[categoryKey].splice(qIndex, 1);
                    saveData();
                    renderTree();
                };

                const answersList = document.createElement('div');
                answersList.className = 'answers-list';

                qItem.answers.forEach((ans, ansIndex) => {
                    const ansRow = document.createElement('div');
                    ansRow.className = 'answer-item';

                    // Answer Index Label (0, 1, 2, 3...)
                    const indexSpan = document.createElement('span');
                    indexSpan.className = 'answer-index';
                    indexSpan.textContent = `${ansIndex}:`;

                    // Editable Answer Text
                    const ansSpan = document.createElement('span');
                    ansSpan.contentEditable = true;
                    ansSpan.textContent = ans;
                    ansSpan.style.flex = "1";
                    ansSpan.onblur = (e) => {
                        dataset[categoryKey][qIndex].answers[ansIndex] = e.target.textContent.trim();
                        saveData();
                    };

                    // Toggle Correct Answer Badge (Stores Index)
                    const badge = document.createElement('span');
                    const isCorrect = (qItem.correct === ansIndex);
                    badge.className = 'correct-badge';
                    badge.innerHTML = isCorrect ? '✓ (Correct)' : '◯ (Klik als correct)';
                    badge.style.color = isCorrect ? 'var(--success-color)' : '#94a3b8';
                    badge.onclick = () => {
                        dataset[categoryKey][qIndex].correct = ansIndex;
                        saveData();
                        renderTree();
                    };

                    // Delete Single Answer Option Button
                    const delAnsBtn = document.createElement('button');
                    delAnsBtn.className = 'btn-icon';
                    delAnsBtn.textContent = '×';
                    delAnsBtn.title = 'Wis antwoord';
                    delAnsBtn.onclick = () => {
                        dataset[categoryKey][qIndex].answers.splice(ansIndex, 1);
                        if (dataset[categoryKey][qIndex].correct >= dataset[categoryKey][qIndex].answers.length) {
                            dataset[categoryKey][qIndex].correct = 0;
                        }
                        saveData();
                        renderTree();
                    };

                    ansRow.appendChild(indexSpan);
                    ansRow.appendChild(ansSpan);
                    ansRow.appendChild(badge);
                    ansRow.appendChild(delAnsBtn);
                    answersList.appendChild(ansRow);
                });

                // Add Answer Button
                const addAnsBtn = document.createElement('button');
                addAnsBtn.className = 'btn btn-sm btn-outline';
                addAnsBtn.textContent = '+ Voeg antwoord toe';
                addAnsBtn.onclick = () => addAnswer(categoryKey, qIndex);

                li.appendChild(delQBtn);
                li.appendChild(qTitle);
                li.appendChild(answersList);
                li.appendChild(addAnsBtn);
                list.appendChild(li);
            });

            // Add Question Button
            const addQBtn = document.createElement('button');
            addQBtn.className = 'btn btn-sm';
            addQBtn.textContent = '+ Nieuwe Vraag';
            addQBtn.onclick = () => addQuestion(categoryKey);

            details.appendChild(summary);
            details.appendChild(list);
            details.appendChild(addQBtn);
            container.appendChild(details);
        });

        renderJson();
    }

    // Render Raw JSON Data
    function renderJson() {
        const jsonCode = document.getElementById('json-code');
        jsonCode.textContent = JSON.stringify(dataset, null, 4);
    }

    // Add a New Category
    function addCategory() {
        const newCatKey = "nieuwe_categorie_" + Object.keys(dataset).length;
        dataset[newCatKey] = [];
        saveData();
        renderTree();
    }

    // Add a New Blank Question
    function addQuestion(categoryKey) {
        dataset[categoryKey].push({
            question: "Typ hier je nieuwe vraag...",
            answers: ["Optie 0", "Optie 1"],
            correct: 0
        });
        saveData();
        renderTree();
    }

    // Add a New Answer Option to a Question
    function addAnswer(categoryKey, questionIndex) {
        const newIndex = dataset[categoryKey][questionIndex].answers.length;
        dataset[categoryKey][questionIndex].answers.push(`Optie ${newIndex}`);
        saveData();
        renderTree();
    }

    // Tab Switcher Handler
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    // Copy JSON to Clipboard
    function copyJsonData() {
        const jsonText = JSON.stringify(dataset, null, 4);
        navigator.clipboard.writeText(jsonText).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Gekopieerd!';
            setTimeout(() => btn.textContent = 'Kopieer JSON', 2000);
        });
    }

    // Initialize View
    renderTree();
</script>

</body>
</html>
