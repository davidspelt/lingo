<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Data Manager</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #16a34a;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background: var(--card-bg);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 1.5rem;
        }

        .tab-content.active {
            display: block;
        }

        /* Tree Controls */
        .tree-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Tree View Styles */
        .tree-view details {
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            background-color: #fafafa;
        }

        .tree-view summary {
            font-weight: 600;
            cursor: pointer;
            color: var(--primary-color);
            font-size: 1.1rem;
            outline: none;
        }

        .tree-view ul {
            list-style-type: none;
            padding-left: 1rem;
            margin: 0.75rem 0 0 0;
        }

        .question-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .question-title {
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .options-list {
            padding-left: 1.25rem !important;
            margin: 0.25rem 0 !important;
            font-size: 0.9rem;
            color: #475569;
        }

        .correct-answer {
            color: var(--success-color);
            font-weight: 600;
        }

        /* JSON View Styles */
        .json-container {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        pre {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 450px;
            font-size: 0.9rem;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Tabs Header -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tree-tab', this)">Category & Question Tree</button>
        <button class="tab-btn" onclick="switchTab('json-tab', this)">Raw JSON Data</button>
    </div>

    <!-- Tree View Tab -->
    <div id="tree-tab" class="tab-content active">
        <div class="tree-header">
            <h3 style="margin: 0;">Interactive Tree</h3>
            <button class="btn" onclick="addCategory()">+ Add Category</button>
        </div>
        <div id="tree-container" class="tree-view"></div>
    </div>

    <!-- JSON View Tab -->
    <div id="json-tab" class="tab-content">
        <div class="json-container">
            <button class="btn copy-btn" onclick="copyJsonData()">Copy JSON</button>
            <pre><code id="json-code"></code></pre>
        </div>
    </div>
</div>

<script>
    // Sample Dataset with Questions, Options, and Correct Answers
    let dataset = [
        {
            category: "General Knowledge",
            questions: [
                {
                    question: "What is the capital of France?",
                    options: ["London", "Paris", "Berlin", "Madrid"],
                    answer: "Paris"
                },
                {
                    question: "Which planet is known as the Red Planet?",
                    options: ["Earth", "Mars", "Jupiter", "Venus"],
                    answer: "Mars"
                }
            ]
        },
        {
            category: "Technology",
            questions: [
                {
                    question: "What does HTML stand for?",
                    options: [
                        "Hyper Text Markup Language",
                        "High Tech Multi Language",
                        "Hyper Transfer Mark Language"
                    ],
                    answer: "Hyper Text Markup Language"
                }
            ]
        }
    ];

    // Render Category & Question Tree View
    function renderTree() {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';

        dataset.forEach((catItem, catIndex) => {
            const details = document.createElement('details');
            details.open = true; // Kept open by default
            
            const summary = document.createElement('summary');
            summary.textContent = `${catItem.category} (${catItem.questions.length})`;
            
            const list = document.createElement('ul');

            catItem.questions.forEach(qItem => {
                const li = document.createElement('li');
                li.className = 'question-card';

                const qTitle = document.createElement('div');
                qTitle.className = 'question-title';
                qTitle.textContent = qItem.question;

                const optionsList = document.createElement('ul');
                optionsList.className = 'options-list';

                qItem.options.forEach(opt => {
                    const optLi = document.createElement('li');
                    if (opt === qItem.answer) {
                        optLi.innerHTML = `${opt} <span class="correct-answer">✓ (Correct)</span>`;
                    } else {
                        optLi.textContent = opt;
                    }
                    optionsList.appendChild(optLi);
                });

                li.appendChild(qTitle);
                li.appendChild(optionsList);
                list.appendChild(li);
            });

            // Add Question Button for this specific Category
            const addQBtn = document.createElement('button');
            addQBtn.className = 'btn btn-sm';
            addQBtn.textContent = '+ Add Question';
            addQBtn.onclick = () => addQuestion(catIndex);

            details.appendChild(summary);
            details.appendChild(list);
            details.appendChild(addQBtn);
            container.appendChild(details);
        });

        // Always sync JSON view when tree updates
        renderJson();
    }

    // Render Raw JSON Data
    function renderJson() {
        const jsonCode = document.getElementById('json-code');
        jsonCode.textContent = JSON.stringify(dataset, null, 2);
    }

    // Add a New Category
    function addCategory() {
        const categoryName = prompt("Enter new category name:");
        if (categoryName && categoryName.trim() !== "") {
            dataset.push({
                category: categoryName.trim(),
                questions: []
            });
            renderTree();
        }
    }

    // Add a New Question to a Category
    function addQuestion(categoryIndex) {
        const questionText = prompt("Enter the question:");
        if (!questionText) return;

        const optionsString = prompt("Enter options separated by commas (e.g. Option A, Option B, Option C):");
        if (!optionsString) return;

        const options = optionsString.split(',').map(opt => opt.trim()).filter(opt => opt !== "");
        
        const answerText = prompt(`Enter the exact correct answer from your options:\n[ ${options.join(' | ')} ]`);

        if (questionText && options.length > 0) {
            dataset[categoryIndex].questions.push({
                question: questionText,
                options: options,
                answer: answerText ? answerText.trim() : options[0]
            });
            renderTree();
        }
    }

    // Tab Switcher Handler
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    // Copy JSON to Clipboard
    function copyJsonData() {
        const jsonText = JSON.stringify(dataset, null, 2);
        navigator.clipboard.writeText(jsonText).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy JSON', 2000);
        });
    }

    // Initialize View
    renderTree();
</script>

</body>
</html>
