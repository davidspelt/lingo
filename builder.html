<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Data Beheerder</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --danger-color: #dc2626;
            --success-color: #16a34a;
            --secondary-color: #64748b;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            background: var(--card-bg);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 1.5rem;
        }

        .tab-content.active {
            display: block;
        }

        /* Tree Controls */
        .tree-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Buttons */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: #475569;
        }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .btn-danger {
            background-color: var(--danger-color);
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        /* Tree View Styles */
        .tree-view details {
            margin-bottom: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            background-color: #fafafa;
        }

        .tree-view summary {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
            outline: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tree-view ul {
            list-style-type: none;
            padding-left: 0;
            margin: 0.75rem 0 0 0;
        }

        .question-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
        }

        /* Inline Editable Field Styling */
        [contenteditable="true"] {
            border: 1px dashed transparent;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        [contenteditable="true"]:hover {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        [contenteditable="true"]:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .question-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: inline-block;
            width: calc(100% - 80px);
        }

        .options-list {
            padding-left: 1.25rem !important;
            margin: 0.25rem 0 !important;
            font-size: 0.9rem;
            color: #475569;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .correct-badge {
            color: var(--success-color);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        /* JSON View Styles */
        .json-container {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        pre {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 450px;
            font-size: 0.9rem;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Tabs Header -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tree-tab', this)">Categorie & Vragen Tree</button>
        <button class="tab-btn" onclick="switchTab('json-tab', this)">Ruwe JSON Data</button>
    </div>

    <!-- Tree View Tab -->
    <div id="tree-tab" class="tab-content active">
        <div class="tree-header">
            <h3 style="margin: 0;">Interactieve Editor</h3>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="resetToDefault()">Reset Naar Standaard</button>
                <button class="btn" onclick="addCategory()">+ Categorie Toevoegen</button>
            </div>
        </div>
        <div id="tree-container" class="tree-view"></div>
    </div>

    <!-- JSON View Tab -->
    <div id="json-tab" class="tab-content">
        <div class="json-container">
            <button class="btn copy-btn" onclick="copyJsonData()">Kopieer JSON</button>
            <pre><code id="json-code"></code></pre>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = "quiz_data_cache";

    // Default Dutch Example Dataset
    const defaultDataset = [
        {
            category: "Algemene Kennis",
            questions: [
                {
                    question: "Wat is de hoofdstad van Nederland?",
                    options: ["Rotterdam", "Amsterdam", "Utrecht", "Den Haag"],
                    answer: "Amsterdam"
                },
                {
                    question: "Hoeveel provincies heeft Nederland?",
                    options: ["10", "11", "12", "14"],
                    answer: "12"
                }
            ]
        },
        {
            category: "Technologie",
            questions: [
                {
                    question: "Waar staat de afkorting HTML voor?",
                    options: [
                        "HyperText Markup Language",
                        "HighText Machine Language",
                        "Hyper Transfer Main Language"
                    ],
                    answer: "HyperText Markup Language"
                }
            ]
        }
    ];

    // Load dataset from LocalStorage Cache or fallback to default
    let dataset = loadDataset();

    function loadDataset() {
        const cachedData = localStorage.getItem(STORAGE_KEY);
        if (cachedData) {
            try {
                return JSON.parse(cachedData);
            } catch (e) {
                console.error("Fout bij het laden van cache:", e);
            }
        }
        return defaultDataset;
    }

    // Save dataset to LocalStorage Cache
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataset));
        renderJson();
    }

    // Reset Cache to Original Default
    function resetToDefault() {
        if (confirm("Weet je zeker dat je alle wijzigingen wilt wissen en wilt herstellen naar het standaard voorbeeld?")) {
            dataset = JSON.parse(JSON.stringify(defaultDataset));
            saveData();
            renderTree();
        }
    }

    // Render Tree with Inline Editors
    function renderTree() {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';

        dataset.forEach((catItem, catIndex) => {
            const details = document.createElement('details');
            details.open = true;
            
            const summary = document.createElement('summary');
            
            // Editable Category Name
            const catNameSpan = document.createElement('span');
            catNameSpan.contentEditable = true;
            catNameSpan.textContent = catItem.category;
            catNameSpan.onblur = (e) => {
                dataset[catIndex].category = e.target.textContent.trim();
                saveData();
            };

            const countSpan = document.createElement('span');
            countSpan.style.color = '#64748b';
            countSpan.style.fontSize = '0.9rem';
            countSpan.textContent = `(${catItem.questions.length})`;

            // Delete Category Button
            const delCatBtn = document.createElement('button');
            delCatBtn.className = 'btn btn-danger';
            delCatBtn.textContent = 'Verwijder';
            delCatBtn.onclick = (e) => {
                e.stopPropagation();
                dataset.splice(catIndex, 1);
                saveData();
                renderTree();
            };

            summary.appendChild(catNameSpan);
            summary.appendChild(countSpan);
            summary.appendChild(delCatBtn);
            
            const list = document.createElement('ul');

            catItem.questions.forEach((qItem, qIndex) => {
                const li = document.createElement('li');
                li.className = 'question-card';

                // Editable Question Title
                const qTitle = document.createElement('div');
                qTitle.className = 'question-title';
                qTitle.contentEditable = true;
                qTitle.textContent = qItem.question;
                qTitle.onblur = (e) => {
                    dataset[catIndex].questions[qIndex].question = e.target.textContent.trim();
                    saveData();
                };

                // Delete Question Button
                const delQBtn = document.createElement('button');
                delQBtn.className = 'btn btn-danger';
                delQBtn.style.float = 'right';
                delQBtn.textContent = 'Wis Vraag';
                delQBtn.onclick = () => {
                    dataset[catIndex].questions.splice(qIndex, 1);
                    saveData();
                    renderTree();
                };

                const optionsList = document.createElement('div');
                optionsList.className = 'options-list';

                qItem.options.forEach((opt, optIndex) => {
                    const optRow = document.createElement('div');
                    optRow.className = 'option-item';

                    // Editable Option Text
                    const optSpan = document.createElement('span');
                    optSpan.contentEditable = true;
                    optSpan.textContent = opt;
                    optSpan.onblur = (e) => {
                        const oldVal = dataset[catIndex].questions[qIndex].options[optIndex];
                        const newVal = e.target.textContent.trim();
                        dataset[catIndex].questions[qIndex].options[optIndex] = newVal;
                        
                        // Update answer if the edited option was the correct one
                        if (dataset[catIndex].questions[qIndex].answer === oldVal) {
                            dataset[catIndex].questions[qIndex].answer = newVal;
                        }
                        saveData();
                    };

                    // Toggle Correct Answer Badge
                    const badge = document.createElement('span');
                    const isCorrect = (opt === qItem.answer);
                    badge.className = 'correct-badge';
                    badge.innerHTML = isCorrect ? '✓ (Correct antwoord)' : '◯ (Klik als correct)';
                    badge.style.color = isCorrect ? 'var(--success-color)' : '#94a3b8';
                    badge.onclick = () => {
                        dataset[catIndex].questions[qIndex].answer = dataset[catIndex].questions[qIndex].options[optIndex];
                        saveData();
                        renderTree();
                    };

                    optRow.appendChild(optSpan);
                    optRow.appendChild(badge);
                    optionsList.appendChild(optRow);
                });

                li.appendChild(delQBtn);
                li.appendChild(qTitle);
                li.appendChild(optionsList);
                list.appendChild(li);
            });

            // Add Question Button
            const addQBtn = document.createElement('button');
            addQBtn.className = 'btn btn-sm';
            addQBtn.textContent = '+ Nieuwe Vraag';
            addQBtn.onclick = () => addQuestion(catIndex);

            details.appendChild(summary);
            details.appendChild(list);
            details.appendChild(addQBtn);
            container.appendChild(details);
        });

        renderJson();
    }

    // Render Raw JSON Data
    function renderJson() {
        const jsonCode = document.getElementById('json-code');
        jsonCode.textContent = JSON.stringify(dataset, null, 2);
    }

    // Add a New Category
    function addCategory() {
        dataset.push({
            category: "Nieuwe Categorie",
            questions: []
        });
        saveData();
        renderTree();
    }

    // Add a New Blank Question
    function addQuestion(categoryIndex) {
        dataset[categoryIndex].questions.push({
            question: "Typ hier je nieuwe vraag...",
            options: ["Optie 1", "Optie 2", "Optie 3"],
            answer: "Optie 1"
        });
        saveData();
        renderTree();
    }

    // Tab Switcher Handler
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    // Copy JSON to Clipboard
    function copyJsonData() {
        const jsonText = JSON.stringify(dataset, null, 2);
        navigator.clipboard.writeText(jsonText).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Gekopieerd!';
            setTimeout(() => btn.textContent = 'Kopieer JSON', 2000);
        });
    }

    // Initialize View
    renderTree();
</script>

</body>
</html>
