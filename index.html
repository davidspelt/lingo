<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingo Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>LINGO</h1>
        
        <div class="menu">
            <p class="menu-label">Kies woordlengte en start:</p>
            <div class="mode-buttons">
                <button class="mode-btn active" data-length="5">5 Letters</button>
                <button class="mode-btn" data-length="6">6 Letters</button>
                <button class="mode-btn" data-length="10">10 Letters</button>
            </div>
        </div>

        <div id="board" class="board"></div>

        <p id="message" class="message"></p>

        <div id="keyboard" class="keyboard"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
