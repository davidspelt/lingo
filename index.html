<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Games Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hub-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-top: 25px;
        }
        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 22px;
            font-size: 1.4rem;
            text-decoration: none;
        }
        .hub-btn.lingo-btn {
            background-color: rgba(228, 63, 90, 0.1);
            border-color: var(--primary);
            color: #fff;
        }
        .hub-btn.lingo-btn:hover { background-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        
        .hub-btn.quiz-btn {
            background-color: rgba(52, 152, 219, 0.1);
            border-color: var(--team-a);
            color: #fff;
        }
        .hub-btn.quiz-btn:hover { background-color: var(--team-a); box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }

        .hub-btn.sport-btn {
            background-color: rgba(46, 204, 113, 0.1);
            border-color: var(--team-b);
            color: #fff;
        }
        .hub-btn.sport-btn:hover { background-color: var(--team-b); box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }

        .edit-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: -10px;
            margin-bottom: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="game-container" style="max-width: 600px;">
        <div class="header">
            <h1>PARTY<span>GAMES</span></h1>
        </div>

        <div class="edit-hint">💡 Dubbelklik op een teamnaam om deze te veranderen!</div>

        <!-- Scorebord met dubbelklik-actie -->
        <div class="team-selector-container">
            <div id="team-a-box" class="team-box team-a" onclick="selectTeam('A')" ondblclick="editTeamName('A')">
                <div id="name-a" class="team-name">TEAM A</div>
                <div id="score-a" class="team-score">0</div>
            </div>
            <div class="vs-divider">VS</div>
            <div id="team-b-box" class="team-box team-b" onclick="selectTeam('B')" ondblclick="editTeamName('B')">
                <div id="name-b" class="team-name">TEAM B</div>
                <div id="score-b" class="team-score">0</div>
            </div>
        </div>

        <div class="hub-menu">
            <a href="lingo.html" class="btn hub-btn lingo-btn">🟥 Start Lingo</a>
            <a href="quiz.html" class="btn hub-btn quiz-btn">🟦 Start Quiz</a>
            <a href="sport.html?name=Voetbal&accent=bal" class="menu-card">⚽ Voetbal</a>
            <a href="sport.html?name=Beerpong&accent=pong" class="menu-card">🏓 Beerpong</a>
            <a href="sport.html?name=Darten&accent=180" class="menu-card">🎯 Darten</a>
        </div>
    </div>

    <button class="reset-scores-btn" onclick="resetAllScores()">🔄 Reset alles</button>

    <script src="shared-teams.js"></script>
</body>
</html>
