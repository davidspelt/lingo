<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingo Deluxe</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #141b29;
            --primary: #e43f5a;
            --primary-glow: rgba(228, 63, 90, 0.4);
            --correct: #e43f5a;
            --present: #ffb100;
            --absent: #1f293d;
            --cell-border: #2c3a57;
            --text-light: #ffffff;
            --text-muted: #7e8fa8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto; /* Zorg dat we kunnen scrollen als het bord lang wordt */
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px 0;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 15px var(--primary-glow), 0 0 30px var(--primary-glow);
            margin-bottom: 5px;
            display: inline-block;
        }

        h1 span {
            color: var(--primary);
        }

        /* Mode Buttons */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border: 2px solid var(--cell-border);
            background-color: var(--bg-dark);
            color: var(--text-light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn:hover:not(:disabled) {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Sound Control */
        .sound-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .sound-toggle:hover {
            color: var(--text-light);
        }

        /* Board Styling */
        .board-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            max-height: 400px; /* Beperk de hoogte van het bord en laat het scrollen indien nodig */
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom scrollbar voor het bord */
        .board-container::-webkit-scrollbar {
            width: 6px;
        }
        .board-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .board-container::-webkit-scrollbar-thumb {
            background: var(--cell-border);
            border-radius: 10px;
        }

        .board {
            display: grid;
            gap: 10px;
            width: 100%;
        }

        .row {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1/1;
            flex: 1;
            max-width: 65px;
            border: 3px solid var(--cell-border);
            border-radius: 12px;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            user-select: none;
            transition: transform 0.1s ease;
            position: relative;
        }

        /* Cell animations */
        .cell.pop {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .cell.reveal {
            animation: flipIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes flipIn {
            0% { transform: scaleY(1); }
            45% { transform: scaleY(0); }
            55% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }

        /* Lingo colors */
        .cell.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            box-shadow: 0 0 15px rgba(228, 63, 90, 0.6);
            color: #ffffff;
        }

        .cell.present {
            background-color: var(--present);
            border-color: var(--present);
            box-shadow: 0 0 15px rgba(255, 177, 0, 0.6);
            border-radius: 50%;
            color: #0a0e17;
        }

        .cell.absent {
            background-color: var(--absent);
            border-color: var(--absent);
            color: var(--text-muted);
        }

        .cell.hint-letter {
            color: rgba(255, 255, 255, 0.35);
            border-style: dashed;
        }

        /* Feedback Message */
        .message-container {
            height: 40px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            text-align: center;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .message.error {
            color: #ff4a4a;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* Custom Modal Dialog */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(5, 7, 12, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: var(--bg-card);
            border: 3px solid var(--primary);
            border-radius: 20px;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(228, 63, 90, 0.3);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .modal-title.win {
            color: var(--present);
            text-shadow: 0 0 15px rgba(255, 177, 0, 0.4);
        }

        .modal-title.lose {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .modal-body {
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .word-reveal {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            background-color: #0b0c10;
            padding: 10px 20px;
            border-radius: 10px;
            margin: 15px 0;
            display: inline-block;
            border: 1px solid var(--cell-border);
        }

        /* Adjustments for smaller heights */
        @media (max-height: 700px) {
            h1 { font-size: 2.5rem; }
            .cell { max-width: 50px; font-size: 1.6rem; }
            .game-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <h1>LIN<span>GO</span></h1>
        </div>

        <!-- Controls / Mode Selection -->
        <div class="controls">
            <div class="btn-group">
                <button class="btn active" onclick="changeWordLength(5)">5 Letters</button>
                <button class="btn" onclick="changeWordLength(6)">6 Letters</button>
                <button class="btn" onclick="changeWordLength(10)">10 Letters</button>
            </div>
            <button class="sound-toggle" onclick="toggleSound()">
                <span id="sound-icon">🔊</span> Geluid: <span id="sound-status">AAN</span>
            </button>
        </div>

        <!-- Game Board -->
        <div class="board-container" id="board-container">
            <div id="board" class="board"></div>
        </div>

        <!-- Toast / Message area -->
        <div class="message-container">
            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Game Status Modal -->
    <div id="status-modal" class="modal-overlay">
        <div class="modal">
            <div id="modal-title" class="modal-title">GEWONNEN!</div>
            <div class="modal-body">
                <p id="modal-desc">Geweldig gedaan! Je hebt het woord geraden.</p>
                <div id="modal-word" class="word-reveal">WATER</div>
            </div>
            <button class="btn active" onclick="closeModalAndRestart()" style="max-width: 200px; margin: 0 auto;">Speel Nogmaals</button>
        </div>
    </div>

    <script>
        // Ingebouwde back-up woordenlijst (Nederlands)
        const defaultWords = {
            5: ["water", "brood", "fiets", "stoel", "tafel", "bloem", "vogel", "groen", "blauw", "appel", "herfst", "zomer", "kabel", "jeugd", "graan", "schat", "draad", "vloer", "plant", "spoor", "trein", "krant", "feest", "storm", "grens", "piano", "brand", "kaart", "droom", "vlees"],
            6: ["banaan", "koffie", "tomaat", "school", "leraar", "winter", "wortel", "dromen", "geluid", "polder", "kasteel", "reizen", "boeken", "vriend", "muziek", "strand", "vlucht", "slapen", "zuster", "dokter", "keuken", "zolder", "wereld", "oranje", "vlieg", "penseel", "camera", "huizen", "glazen", "straten"],
            10: ["bibliotheek", "vliegtuigen", "universiteit", "computeren", "schilderij", "wandelingen", "ziekenhuizen", "speelplaats", "chocolades", "kabeljauwen", "tekenfilm", "hoofdstad", "speelgoed", "sportvelen", "vriendschap", "vogelkooi", "aardbeving", "bosbranden", "werelddeel", "wintertijd", "klaslokaal", "regendruppel", "vuurtorens", "zandstrand", "bloementuin"]
        };

        let wordsData = JSON.parse(JSON.stringify(defaultWords));
        let secretWord = "";
        let currentAttempt = 0;
        let totalAttempts = 5; // Starten met standaard 5 rijen, maar dit kan nu oneindig groeien
        let wordLength = 5;
        let currentGuess = [];
        let gameActive = false;
        let soundEnabled = true;
        let isAnimating = false; // Input-lock flag om glitchy typgedrag te voorkomen
        
        // Hint tracking states
        let revealedHints = []; // Booleans per letterpositie of het onthuld is als extra hint
        let lastRowCorrect = []; // Correcte letter-indices uit de direct voorgaande rij

        // Web Audio API Synthesizer voor gave Lingo-geluidjes
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'type') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'backspace') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.25);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } else if (type === 'correct') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'present') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now); // A4
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'absent') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(250, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'win') {
                    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(freq, now + (idx * 0.12));
                        g.gain.setValueAtTime(0.1, now + (idx * 0.12));
                        g.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.12) + 0.4);
                        o.start(now + (idx * 0.12));
                        o.stop(now + (idx * 0.12) + 0.45);
                    });
                } else if (type === 'hint') {
                    const notes = [587.33, 698.46, 880.00]; // D5, F5, A5
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(freq, now + (idx * 0.08));
                        g.gain.setValueAtTime(0.08, now + (idx * 0.08));
                        g.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.08) + 0.3);
                        o.start(now + (idx * 0.08));
                        o.stop(now + (idx * 0.08) + 0.35);
                    });
                }
            } catch (e) {
                console.log("Audio play error", e);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-status').innerText = soundEnabled ? "AAN" : "UIT";
            document.getElementById('sound-icon').innerText = soundEnabled ? "🔊" : "🔇";
            if (soundEnabled) {
                initAudio();
                playSound('type');
            }
            if (document.activeElement) {
                document.activeElement.blur(); // Voorkom dat Enter-toets de knop opnieuw klikt
            }
        }

        // Automatische lader voor woorden.csv uit de map
        async function fetchWordsCSV() {
            try {
                const response = await fetch('woorden.csv');
                if (!response.ok) throw new Error("CSV bestand niet gevonden of niet bereikbaar.");
                const text = await response.text();
                const lines = text.split('\n');
                const customLists = { 5: [], 6: [], 10: [] };
                let count = 0;

                lines.forEach(line => {
                    const cleanWord = line.split(',')[0].trim().toLowerCase();
                    if ([5, 6, 10].includes(cleanWord.length) && /^[a-z]+$/.test(cleanWord)) {
                        customLists[cleanWord.length].push(cleanWord);
                        count++;
                    }
                });

                if (count > 0) {
                    wordsData = customLists;
                    console.log(`${count} woorden succesvol geladen uit woorden.csv!`);
                }
            } catch (error) {
                console.warn("Kon woorden.csv niet inladen. We vallen geruisloos terug op de ingebouwde woordenlijst. Reden:", error.message);
            } finally {
                initGame(wordLength);
            }
        }

        // Spelinitialisatie
        function initGame(length) {
            wordLength = length;
            const availableWords = wordsData[wordLength];

            if (!availableWords || availableWords.length === 0) {
                wordsData[wordLength] = defaultWords[wordLength];
            }

            const cleanAvailable = wordsData[wordLength].filter(w => w.length === wordLength);
            secretWord = cleanAvailable[Math.floor(Math.random() * cleanAvailable.length)];
            
            currentAttempt = 0;
            totalAttempts = 5; // We starten altijd met 5 standaardrijen
            isAnimating = false; // Reset lock
            
            // Initialiseer hint en correct arrays
            revealedHints = [0]; // Eerste letter altijd direct cadeau als hint
            lastRowCorrect = []; // Geen voorgaande pogingen dus leeg
            
            currentGuess = [];
            gameActive = true;
            clearMessage();

            // Bouw spelbord
            const board = document.getElementById('board');
            board.innerHTML = '';
            buildGridRows(0, totalAttempts);
        }

        // Generieke functie om rijen aan het grid toe te voegen
        function buildGridRows(startIndex, endIndex) {
            const board = document.getElementById('board');
            board.style.gridTemplateRows = `repeat(${endIndex}, 1fr)`;

            for (let r = startIndex; r < endIndex; r++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let c = 0; c < wordLength; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    
                    // Geef de initiële hint letters cadeau op de actieve rij
                    if (r === currentAttempt) {
                        let isHint = false;
                        if (currentAttempt < 5) {
                            if (c === 0 || lastRowCorrect.includes(c)) {
                                isHint = true;
                            }
                        } else {
                            if (revealedHints.includes(c)) {
                                isHint = true;
                            }
                        }

                        if (isHint) {
                            cell.innerText = secretWord[c];
                            cell.classList.add('hint-letter');
                        }
                    }
                    row.appendChild(cell);
                }
                board.appendChild(row);
            }
        }

        // Dynamisch een extra rij toevoegen aan het speelbord en exact één extra letter onthullen
        function addExtraRow() {
            totalAttempts++;
            buildGridRows(totalAttempts - 1, totalAttempts);
            
            // Zoek posities die nog niet als hint onthuld zijn
            let eligibleIndices = [];
            for (let i = 0; i < wordLength; i++) {
                if (!revealedHints.includes(i)) {
                    eligibleIndices.push(i);
                }
            }

            // Geef exact één extra letter cadeau van links naar rechts
            if (eligibleIndices.length > 0) {
                let nextHintIndex = eligibleIndices[0];
                revealedHints.push(nextHintIndex);
                playSound('hint');
                showMessage(`Nieuwe poging! Extra hint gekregen ✨`);
            } else {
                showMessage(`Nieuwe poging! Blijf proberen! 💪`);
            }

            // Scroll automatisch naar beneden in de board container om de nieuwe actieve rij te focussen
            setTimeout(() => {
                const container = document.getElementById('board-container');
                container.scrollTop = container.scrollHeight;
            }, 50);
        }

        function changeWordLength(len) {
            const buttons = document.querySelectorAll('.btn-group .btn');
            buttons.forEach(btn => {
                if (btn.innerText.includes(len.toString())) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            if (document.activeElement) {
                document.activeElement.blur(); // Voorkom dat Enter-toets de knop opnieuw klikt
            }
            initGame(len);
        }

        // Toetsenbord Input Handler
        function handleKeyPress(key) {
            if (!gameActive || isAnimating) return; // Geen input toestaan als we animeren of game is afgelopen

            if (key === 'backspace') {
                if (currentGuess.length > 0) {
                    currentGuess.pop();
                    playSound('backspace');
                    updateRowUI();
                }
            } else if (key === 'enter') {
                if (currentGuess.length === wordLength) {
                    checkGuess();
                } else {
                    showMessage(`Woord moet exact ${wordLength} letters lang zijn.`, true);
                    playSound('error');
                }
            } else if (/^[a-z]$/.test(key)) {
                if (currentGuess.length < wordLength) {
                    currentGuess.push(key);
                    playSound('type');
                    updateRowUI();
                }
            }
        }

        // Update de actieve rij tijdens het typen
        function updateRowUI() {
            clearMessage();
            for (let c = 0; c < wordLength; c++) {
                const cell = document.getElementById(`cell-${currentAttempt}-${c}`);
                if (!cell) continue;
                
                if (currentGuess[c]) {
                    cell.innerText = currentGuess[c];
                    cell.classList.remove('hint-letter');
                    cell.classList.add('pop');
                    setTimeout(() => cell.classList.remove('pop'), 100);
                } else {
                    // Check of we hints moeten tonen
                    let isHint = false;
                    let hintChar = '';

                    if (currentAttempt < 5) {
                        // Standaard Lingo: Eerste letter of correcte letter uit de vorige poging
                        if (c === 0 || lastRowCorrect.includes(c)) {
                            hintChar = secretWord[c];
                            isHint = true;
                        }
                    } else {
                        // Na de 5e poging: Alleen de expliciet onthulde hints tonen (geeft precies 1 letter cadeau per extra beurt)
                        if (revealedHints.includes(c)) {
                            hintChar = secretWord[c];
                            isHint = true;
                        }
                    }

                    if (isHint) {
                        cell.innerText = hintChar;
                        cell.classList.add('hint-letter');
                    } else {
                        cell.innerText = '';
                        cell.classList.remove('hint-letter');
                    }
                }
            }
        }

        // Controleer het ingediende woord
        function checkGuess() {
            isAnimating = true; // Vergrendel toetsenbord inputs tijdens de flip animaties
            const guess = currentGuess.join('');
            const secretLetters = secretWord.split('');
            const guessLetters = [...currentGuess];
            const rowResults = new Array(wordLength).fill('absent');
            
            // Tijdelijke opslag voor correcte letterposities in deze poging
            let currentRowCorrect = [];

            // 1. Zoek naar perfecte overeenkomsten (correct / rood)
            for (let i = 0; i < wordLength; i++) {
                if (guessLetters[i] === secretLetters[i]) {
                    rowResults[i] = 'correct';
                    currentRowCorrect.push(i); // Sla de index op
                    secretLetters[i] = null;
                    guessLetters[i] = null;
                }
            }

            // 2. Zoek naar bestaande letters op andere plekken (present / geel)
            for (let i = 0; i < wordLength; i++) {
                if (guessLetters[i] !== null) {
                    const index = secretLetters.indexOf(guessLetters[i]);
                    if (index !== -1) {
                        rowResults[i] = 'present';
                        secretLetters[index] = null;
                    }
                }
            }

            // 3. Toon de resultaten letter voor letter met flip animatie
            let delay = 0;
            for (let i = 0; i < wordLength; i++) {
                const cell = document.getElementById(`cell-${currentAttempt}-${i}`);
                if (!cell) continue;
                const status = rowResults[i];
                const letter = currentGuess[i];

                setTimeout(() => {
                    cell.innerText = letter;
                    cell.classList.remove('hint-letter');
                    cell.classList.add('reveal');
                    cell.classList.add(status);
                    playSound(status);
                }, delay);

                delay += 150;
            }

            // Controleer status na de laatste flip animatie (met lichte padding)
            setTimeout(() => {
                if (guess === secretWord) {
                    showEndGameModal(true);
                    isAnimating = false; // Ontgrendel keyboard
                } else {
                    // Update de correcte posities van alleen deze rij voor de volgende poging
                    lastRowCorrect = currentRowCorrect;
                    currentAttempt++;
                    
                    // ALTIJD DOORGAAN MODE:
                    if (currentAttempt >= totalAttempts) {
                        addExtraRow();
                    }
                    
                    currentGuess = [];
                    updateRowUI();
                    isAnimating = false; // Ontgrendel keyboard
                }
            }, delay + 200);
        }

        // Toon notificaties / fouten
        function showMessage(msg, isError = false) {
            const msgEl = document.getElementById('message');
            msgEl.innerText = msg;
            if (isError) {
                msgEl.classList.add('error');
                setTimeout(() => msgEl.classList.remove('error'), 400);
            }
        }

        function clearMessage() {
            document.getElementById('message').innerText = '';
        }

        // Eindscherm Modals
        function showEndGameModal(isWin) {
            gameActive = false;
            const modalOverlay = document.getElementById('status-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const wordReveal = document.getElementById('modal-word');

            wordReveal.innerText = secretWord.toUpperCase();

            if (isWin) {
                title.innerText = "GEWONNEN! 🎉";
                title.className = "modal-title win";
                desc.innerText = `Super gedaan! Je raadde het woord binnen ${currentAttempt + 1} pogingen.`;
                playSound('win');
            }

            modalOverlay.classList.add('active');
        }

        // Herstart het spel
        function closeModalAndRestart() {
            document.getElementById('status-modal').classList.remove('active');
            if (document.activeElement) {
                document.activeElement.blur(); // Voorkom dat de Enter-toets direct nogmaals herstart
            }
            initGame(wordLength);
        }

        // Fysieke toetsenbord luisteraar
        window.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey || e.altKey) return;
            const key = e.key.toLowerCase();
            if (key === 'enter') {
                e.preventDefault(); // Voorkomt dat focused elementen per ongeluk geactiveerd worden!
                handleKeyPress('enter');
            } else if (key === 'backspace') {
                handleKeyPress('backspace');
            } else {
                handleKeyPress(key);
            }
        });

        // Start met het laden van woorden.csv (en valt indien nodig terug op de defaults)
        fetchWordsCSV();
    </script>
</body>
</html>
