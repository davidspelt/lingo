<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Deluxe</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: #141b29;
            --primary: #e43f5a;
            --primary-glow: rgba(228, 63, 90, 0.4);
            --correct: #e43f5a;
            --present: #ffb100;
            --absent: #1f293d;
            --cell-border: #2c3a57;
            --text-light: #ffffff;
            --text-muted: #7e8fa8;
            --team-a: #3498db;
            --team-b: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .game-container {
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 15px var(--primary-glow), 0 0 30px var(--primary-glow);
            margin-bottom: 5px;
            display: inline-block;
        }

        h1 span { color: var(--primary); }

        /* Team Selector Styling */
        .team-selector-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-dark);
            padding: 15px 25px;
            border-radius: 16px;
            border: 2px solid var(--cell-border);
            margin-bottom: 20px;
        }

        .team-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            min-width: 120px;
        }

        .team-box.team-a { color: var(--team-a); }
        .team-box.team-b { color: var(--team-b); }

        .team-box.team-a.active {
            border-color: var(--team-a);
            background-color: rgba(52, 152, 219, 0.1);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.2);
        }

        .team-box.team-b.active {
            border-color: var(--team-b);
            background-color: rgba(46, 204, 113, 0.1);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
        }

        .team-name { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; }
        .team-score { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .vs-divider { font-weight: 900; color: var(--text-muted); font-size: 1.2rem; }

        .stats-bar {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 2px solid var(--cell-border);
            padding-bottom: 10px;
        }

        .stats-bar span span { color: var(--text-light); }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
        }

        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }

        @media (max-width: 500px) { .btn-group { grid-template-columns: 1fr; } }

        .btn {
            width: 100%; padding: 14px; font-size: 1rem; font-weight: 700;
            border: 2px solid var(--cell-border); background-color: var(--bg-dark);
            color: var(--text-light); border-radius: 12px; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase;
            letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn:hover:not(:disabled) { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); transform: translateY(-2px); }
        .btn.active { background-color: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .sound-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; transition: color 0.2s; margin-top: 5px; }
        .sound-toggle:hover { color: var(--text-light); }

        .quiz-area { width: 100%; display: flex; flex-direction: column; gap: 25px; }

        .question-card {
            background-color: var(--bg-dark); border: 3px solid var(--cell-border); border-radius: 16px;
            padding: 30px; text-align: center; font-size: 1.4rem; font-weight: 700; line-height: 1.5;
            min-height: 120px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
        }

        .answers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }

        @media (max-width: 600px) { .answers-grid { grid-template-columns: 1fr; } }

        .answer-btn {
            background-color: var(--bg-dark); border: 3px solid var(--cell-border); border-radius: 14px;
            padding: 20px; font-size: 1.1rem; font-weight: 700; color: var(--text-light); cursor: pointer;
            text-align: left; display: flex; align-items: center; gap: 15px; transition: transform 0.1s ease, background-color 0.3s ease, border-color 0.3s ease; position: relative;
        }

        .answer-btn .prefix {
            background-color: var(--cell-border); color: var(--text-muted); width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center; border-radius: 50%; font-weight: 800; flex-shrink: 0; transition: all 0.3s ease;
        }

        .answer-btn:not(:disabled):hover { border-color: var(--present); transform: translateY(-2px); box-shadow: 0 0 10px rgba(255, 177, 0, 0.2); }
        .answer-btn:not(:disabled):hover .prefix { background-color: var(--present); color: #0a0e17; }

        .answer-btn.selected { background-color: var(--present); border-color: var(--present); color: #0a0e17; box-shadow: 0 0 15px rgba(255, 177, 0, 0.5); }
        .answer-btn.selected .prefix { background-color: #0a0e17; color: var(--present); }

        .answer-btn.correct { background-color: var(--correct); border-color: var(--correct); color: #ffffff; box-shadow: 0 0 15px rgba(228, 63, 90, 0.6); animation: popEffect 0.3s ease; }
        .answer-btn.correct .prefix { background-color: #ffffff; color: var(--correct); }

        .answer-btn.wrong { background-color: var(--absent); border-color: var(--absent); color: var(--text-muted); opacity: 0.6; }

        @keyframes popEffect { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .message-container { height: 40px; margin-top: 15px; display: flex; align-items: center; justify-content: center; }
        .message { font-size: 1.2rem; font-weight: 600; color: var(--text-light); text-align: center; padding: 5px 15px; border-radius: 20px; transition: all 0.3s ease; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(5, 7, 12, 0.85);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(5px);
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal {
            background-color: var(--bg-card); border: 3px solid var(--primary); border-radius: 20px;
            padding: 35px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 40px rgba(228, 63, 90, 0.3); transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal { transform: scale(1); }
        .modal-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        .modal-title.finish { color: var(--present); text-shadow: 0 0 15px rgba(255, 177, 0, 0.4); }
        .modal-body { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.6; }

        @media (max-height: 700px) {
            h1 { font-size: 2.5rem; }
            .game-container { padding: 25px; }
            .question-card { padding: 20px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>QUIZ<span>_</span></h1>
        </div>

        <!-- Team Selector Area -->
        <div class="team-selector-container">
            <div id="team-a-box" class="team-box team-a active" onclick="selectTeam('A')">
                <div class="team-name">TEAM A</div>
                <div id="score-a" class="team-score">0</div>
            </div>
            <div class="vs-divider">VS</div>
            <div id="team-b-box" class="team-box team-b" onclick="selectTeam('B')">
                <div class="team-name">TEAM B</div>
                <div id="score-b" class="team-score">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="btn-group" id="category-group"></div>
            <button class="sound-toggle" onclick="toggleSound()">
                <span id="sound-icon">🔊</span> Geluid: <span id="sound-status">AAN</span>
            </button>
        </div>

        <div class="stats-bar">
            <span>Vraag: <span id="current-question-num">0/0</span></span>
        </div>

        <div class="quiz-area">
            <div class="question-card" id="question-text">
                Kies hierboven een categorie om de quiz te starten!
            </div>
            <div class="answers-grid" id="answers-grid"></div>
        </div>

        <div class="message-container">
            <div id="message" class="message"></div>
        </div>
    </div>

    <div id="status-modal" class="modal-overlay">
        <div class="modal">
            <div id="modal-title" class="modal-title finish">RONDE UIT! 🎉</div>
            <div class="modal-body">
                <p id="modal-desc">Alle vragen uit deze categorie zijn beantwoord!</p>
            </div>
            <button class="btn active" onclick="closeModal()" style="max-width: 250px; margin: 0 auto;">Kies Nieuwe Categorie</button>
        </div>
    </div>

    <script>
        const defaultQuizData = {
            "merken": [
                {"question": "Welk sportmerk heeft een logo dat bekend staat als de 'Swoosh'?", "answers": ["Adidas", "Puma", "Nike", "Reebok"], "correct": 2},
                {"question": "Uit welk land komt het bekende meubelmerk IKEA?", "answers": ["Denemarken", "Zweden", "Noorwegen", "Finland"], "correct": 1},
                {"question": "Welke tech-gigant produceerde oorspronkelijk speelkaarten?", "answers": ["Nintendo", "Sony", "Apple", "Sega"], "correct": 0}
            ],
            "geografie": [
                {"question": "Wat is de hoofdstad van Australië?", "answers": ["Sydney", "Melbourne", "Canberra", "Brisbane"], "correct": 2},
                {"question": "Welke rivier stroomt er dwars door de stad Parijs?", "answers": ["De Loire", "De Seine", "De Rhône", "De Rijn"], "correct": 1},
                {"question": "Wat is het grootste land ter wereld qua oppervlakte?", "answers": ["Canada", "Verenigde Staten", "China", "Rusland"], "correct": 3}
            ],
            "spellen": [
                {"question": "In welk populair spel vechten 100 spelers op een eiland tot er één overleeft?", "answers": ["Minecraft", "Fortnite", "Apex Legends", "PUBG"], "correct": 1},
                {"question": "Hoeveel vakjes heeft een standaard schaakbord?", "answers": ["36", "48", "64", "81"], "correct": 2},
                {"question": "Welk personage is de iconische mascotte van SEGA?", "answers": ["Mario", "Crash Bandicoot", "Sonic the Hedgehog", "Pac-Man"], "correct": 2}
            ],
            "films": [
                {"question": "Wie speelde de hoofdrol van Jack Dawson in de klassieker Titanic?", "answers": ["Brad Pitt", "Leonardo DiCaprio", "Matt Damon", "Johnny Depp"], "correct": 1},
                {"question": "Welke filmreeks bevat personages genaamd 'Hobbits'?", "answers": ["Star Wars", "Harry Potter", "The Lord of the Rings", "The Chronicles of Narnia"], "correct": 2},
                {"question": "Hoeveel Oscars won de film 'Avatar' (2009) in totaal?", "answers": ["3", "5", "7", "11"], "correct": 0}
            ]
        };

        let quizData = JSON.parse(JSON.stringify(defaultQuizData));
        let activeCategory = "";
        let currentQuestionIndex = 0;
        let soundEnabled = true;
        let isEvaluating = false;

        // Team Management
        let scores = { A: 0, B: 0 };
        let currentTeam = 'A';

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;

                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08); osc.start(now); osc.stop(now + 0.08);
                } else if (type === 'correct') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now); gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(100, now + 0.25);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25); osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'win') {
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(freq, now + (idx * 0.12));
                        g.gain.setValueAtTime(0.1, now + (idx * 0.12)); g.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.12) + 0.4);
                        o.start(now + (idx * 0.12)); o.stop(now + (idx * 0.12) + 0.45);
                    });
                }
            } catch (e) { console.log("Audio play error", e); }
        }

        function selectTeam(team) {
            if (isEvaluating) return;
            currentTeam = team;
            document.getElementById('team-a-box').classList.toggle('active', team === 'A');
            document.getElementById('team-b-box').classList.toggle('active', team === 'B');
            playSound('click');
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('sound-status').innerText = soundEnabled ? "AAN" : "UIT";
            document.getElementById('sound-icon').innerText = soundEnabled ? "🔊" : "🔇";
            if (soundEnabled) { initAudio(); playSound('click'); }
            if (document.activeElement) document.activeElement.blur();
        }

        async function fetchQuizJSON() {
            try {
                const response = await fetch('vragen.json');
                if (!response.ok) throw new Error("JSON bestand niet gevonden.");
                const data = await response.json();
                if (Object.keys(data).length > 0) quizData = data;
            } catch (error) {
                console.warn("Laden mislukt, we vallen terug op defaults:", error.message);
            } finally {
                buildCategoryButtons();
            }
        }

        function buildCategoryButtons() {
            const container = document.getElementById('category-group');
            container.innerHTML = '';
            Object.keys(quizData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'btn'; btn.id = `cat-btn-${cat}`; btn.innerText = cat;
                btn.onclick = () => startCategory(cat);
                container.appendChild(btn);
            });
        }

        function startCategory(cat) {
            if (isEvaluating) return;
            activeCategory = cat;
            currentQuestionIndex = 0;

            document.querySelectorAll('#category-group .btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `cat-btn-${cat}`);
            });

            if (document.activeElement) document.activeElement.blur();
            loadQuestion();
        }

        function loadQuestion() {
            const questions = quizData[activeCategory];
            document.getElementById('current-question-num').innerText = `${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('message').innerText = "";

            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = q.question;

            const answersGrid = document.getElementById('answers-grid');
            answersGrid.innerHTML = '';

            const prefixes = ["A", "B", "C", "D"];
            q.answers.forEach((ans, idx) => {
                const button = document.createElement('button');
                button.className = 'answer-btn';
                button.innerHTML = `<span class="prefix">${prefixes[idx]}</span> ${ans}`;
                button.onclick = () => selectAnswer(idx);
                answersGrid.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex) {
            if (isEvaluating) return;
            isEvaluating = true;

            const questions = quizData[activeCategory];
            const q = questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.answers-grid .answer-btn');

            buttons[selectedIndex].classList.add('selected');
            playSound('click');

            setTimeout(() => {
                buttons.forEach((btn, idx) => {
                    btn.classList.remove('selected');
                    btn.disabled = true; 
                    btn.classList.add(idx === q.correct ? 'correct' : 'wrong');
                });

                if (selectedIndex === q.correct) {
                    scores[currentTeam] += 1; // Altijd 1 punt bij de quiz
                    document.getElementById('score-a').innerText = scores.A;
                    document.getElementById('score-b').innerText = scores.B;
                    playSound('correct');
                    document.getElementById('message').innerText = `Team ${currentTeam} scoort +1 punt! ✨`;
                } else {
                    playSound('wrong');
                    document.getElementById('message').innerText = "Helaas, onjuist! 🧩";
                }

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        loadQuestion();
                        isEvaluating = false;
                    } else {
                        showEndModal();
                    }
                }, 1500);

            }, 800);
        }

        function showEndModal() {
            document.getElementById('status-modal').classList.add('active');
            playSound('win');
        }

        function closeModal() {
            document.getElementById('status-modal').classList.remove('active');
            document.querySelectorAll('#category-group .btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('question-text').innerText = "Kies hierboven een categorie om een nieuwe quiz te starten!";
            document.getElementById('answers-grid').innerHTML = '';
            document.getElementById('current-question-num').innerText = "0/0";
            document.getElementById('message').innerText = "";
            isEvaluating = false;
        }

        fetchQuizJSON();
    </script>
</body>
</html>
